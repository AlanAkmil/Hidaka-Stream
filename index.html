<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>HidakaStream</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0c0c0c;--surface:#161616;--card:#1e1e1e;--card2:#252525;
  --border:#2a2a2a;--border2:#333;
  --gold:#d4a843;--gold2:#f0c060;--gold-dim:#7a5820;--gold-bg:#1a1408;
  --text:#f0f0f0;--text2:#b0b0b0;--muted:#666;
  --radius:12px;--radius-sm:8px;--nav-h:60px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--gold-dim);border-radius:2px}

/* ── TOPNAV ── */
#topnav{position:fixed;top:0;left:0;right:0;z-index:200;height:var(--nav-h);
  background:var(--bg);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.logo{font-family:'Cinzel',serif;font-size:17px;font-weight:700;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.logo-sub{font-size:9px;color:var(--muted);font-family:'Inter',sans-serif;
  -webkit-text-fill-color:var(--muted);display:block;margin-top:-2px;letter-spacing:1px}
.icon-btn{background:var(--card);border:1px solid var(--border);border-radius:50%;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.icon-btn svg{width:16px;height:16px;stroke:var(--text2);fill:none;stroke-width:2}

/* ── BOTNAV ── */
#botnav{position:fixed;bottom:0;left:0;right:0;z-index:200;height:var(--nav-h);
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around}
.bnav{display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:5px 10px;cursor:pointer;color:var(--muted);font-size:9px;font-weight:500;
  border:none;background:none;transition:color .2s;min-width:54px}
.bnav svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.8}
.bnav.active{color:var(--gold)}
.bnav.active svg{stroke:var(--gold)}

/* ── APP ── */
#app{padding-top:var(--nav-h);padding-bottom:calc(var(--nav-h)+6px);min-height:100vh}
.section{display:none}.section.active{display:block}

/* ══════════════════════════════════════
   SHARED COMPONENTS
══════════════════════════════════════ */
.sh{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px}
.sh-title{font-size:16px;font-weight:700;color:var(--text)}
.sh-more{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none}
.gline{height:1px;background:linear-gradient(to right,transparent,var(--gold-dim),transparent);margin:4px 0}

/* Hero Slider (Donghua style) */
.hero-wrap{position:relative;width:100%;height:230px;overflow:hidden;background:#111}
.hero-track{display:flex;height:100%;transition:transform .4s ease}
.hero-slide{flex:0 0 100%;position:relative;overflow:hidden}
.hero-img{width:100%;height:100%;object-fit:cover;opacity:.65}
.hero-overlay{position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 15%,rgba(12,12,12,.97) 100%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:14px 16px}
.hero-badge{display:inline-flex;align-items:center;gap:4px;background:var(--gold);
  color:#000;font-size:9px;font-weight:700;padding:3px 8px;border-radius:20px;
  margin-bottom:5px;width:fit-content}
.hero-title{font-size:19px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.2}
.hero-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2)}
.hero-status{background:#1a3a1a;color:#4caf50;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.hero-dots{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:2}
.hero-dot{width:5px;height:5px;border-radius:50%;background:#fff3;transition:all .3s;cursor:pointer}
.hero-dot.active{width:16px;border-radius:3px;background:var(--gold)}

/* Continue Watching */
.cw-scroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.cw-scroll::-webkit-scrollbar{display:none}
.cw-card{flex:0 0 155px;border-radius:var(--radius);overflow:hidden;background:var(--card);
  border:1px solid var(--border);cursor:pointer;position:relative}
.cw-card:active{opacity:.85}
.cw-thumb{width:100%;height:88px;object-fit:cover;display:block;background:var(--border)}
.cw-bar{position:absolute;bottom:88px;left:0;right:0;height:3px;background:#fff1}
.cw-prog{height:100%;background:var(--gold);width:35%}
.cw-info{padding:7px 8px}
.cw-ep{font-size:10px;color:var(--gold);font-weight:600;margin-bottom:2px}
.cw-title{font-size:11px;font-weight:500;color:var(--text);display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

/* Episode Scroll (Donghua style) */
.ep-scroll{display:flex;gap:10px;padding:0 16px;overflow-x:auto;scrollbar-width:none}
.ep-scroll::-webkit-scrollbar{display:none}
.ep-card{flex:0 0 110px;cursor:pointer}.ep-card:active{opacity:.85}
.ep-thumb-wrap{position:relative;border-radius:var(--radius-sm);overflow:hidden;width:110px;height:150px;background:var(--border)}
.ep-thumb{width:100%;height:100%;object-fit:cover;display:block}
.ep-overlay{position:absolute;bottom:0;left:0;right:0;padding:5px;background:linear-gradient(transparent,rgba(0,0,0,.88))}
.ep-num{font-size:10px;font-weight:700;color:#fff}
.ep-new{position:absolute;top:5px;left:5px;background:var(--gold);color:#000;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px}
.ep-title{font-size:11px;color:var(--text2);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

/* Grid 3 (Donghua style) */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px}
.gc{cursor:pointer}.gc:active{opacity:.85}
.gc-wrap{position:relative;border-radius:var(--radius-sm);overflow:hidden;width:100%;aspect-ratio:2/3;background:var(--border)}
.gc-img{width:100%;height:100%;object-fit:cover;display:block}
.gc-overlay{position:absolute;bottom:0;left:0;right:0;padding:5px;background:linear-gradient(transparent,rgba(0,0,0,.88))}
.gc-eps{font-size:10px;font-weight:700;color:#fff}
.gc-badge{position:absolute;top:5px;left:5px;background:var(--gold);color:#000;font-size:8px;font-weight:700;padding:2px 5px;border-radius:4px}
.gc-title{font-size:11px;color:var(--text2);margin-top:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

/* Popular List */
.pop-list{display:flex;flex-direction:column;gap:8px;padding:0 16px}
.pop-item{display:flex;gap:12px;align-items:center;padding:10px;background:var(--card);
  border-radius:var(--radius);border:1px solid var(--border);cursor:pointer}
.pop-item:active{border-color:var(--gold-dim)}
.pop-rank{font-family:'Cinzel',serif;font-size:20px;font-weight:700;color:var(--border2);min-width:30px;text-align:center}
.pop-rank.t{color:var(--gold-dim)}
.pop-img{width:46px;height:64px;object-fit:cover;border-radius:6px;background:var(--border);flex-shrink:0}
.pop-info{flex:1;min-width:0}
.pop-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pop-meta{display:flex;gap:6px;align-items:center}
.pop-ep{font-size:11px;color:var(--muted)}
.pop-tag{font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600}
.pop-tag.on{background:#0d2b0d;color:#4caf50}

/* Pagination */
.pagination{display:flex;justify-content:center;gap:10px;padding:16px}
.page-btn{padding:8px 20px;border-radius:var(--radius-sm);background:var(--card);
  border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer}
.page-btn:disabled{opacity:.3;cursor:default}

/* Tabs */
.tab-row{display:flex;gap:8px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab-pill{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:var(--card);
  color:var(--muted);transition:all .2s;white-space:nowrap;flex-shrink:0}
.tab-pill.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* ══════════════════════════════════════
   FILM — NETFLIX STYLE (ENHANCED)
══════════════════════════════════════ */

/* Film Featured Banner */
.film-featured{position:relative;width:100%;height:460px;overflow:hidden;background:#111;margin-bottom:8px}
.film-feat-img{width:100%;height:100%;object-fit:cover;filter:brightness(0.85)}
.film-feat-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(12,12,12,.98) 0%,rgba(12,12,12,.4) 60%,transparent 100%),
             linear-gradient(to right,rgba(12,12,12,.8) 0%,transparent 40%);
  display:flex;flex-direction:column;justify-content:flex-end;padding:20px 16px 30px}
.film-feat-label{font-size:11px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.film-feat-title{font-size:28px;font-weight:700;color:#fff;line-height:1.15;margin-bottom:8px;letter-spacing:-0.5px;text-shadow:0 2px 4px rgba(0,0,0,0.5)}
.film-feat-meta{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.film-feat-year{font-size:13px;color:var(--gold);font-weight:600}
.film-feat-genre{font-size:13px;color:var(--text2)}
.film-feat-sep{width:4px;height:4px;border-radius:50%;background:var(--muted)}
.film-feat-synopsis{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;max-width:360px}
.film-feat-btns{display:flex;gap:12px}
.film-feat-play{display:flex;align-items:center;gap:8px;background:var(--gold);
  color:#000;font-size:14px;font-weight:700;padding:10px 24px;border-radius:var(--radius-sm);
  border:none;cursor:pointer;transition:opacity .2s}
.film-feat-play:active{opacity:.85}
.film-feat-play svg{width:18px;height:18px;fill:#000;stroke:none}
.film-feat-info{display:flex;align-items:center;gap:8px;background:#ffffff22;
  color:#fff;font-size:14px;font-weight:600;padding:10px 20px;border-radius:var(--radius-sm);
  border:1px solid #ffffff33;cursor:pointer;backdrop-filter:blur(4px)}
.film-feat-info svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2}

/* Film Row (horizontal scroll) */
.film-row-wrap{margin-bottom:12px}
.film-row-title{font-size:16px;font-weight:700;color:var(--text);padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between}
.film-row-more{font-size:12px;color:var(--gold);cursor:pointer;background:none;border:none}
.film-row{display:flex;gap:10px;padding:0 16px 8px;overflow-x:auto;scrollbar-width:none}
.film-row::-webkit-scrollbar{display:none}
.film-card{flex:0 0 130px;cursor:pointer}.film-card:active{opacity:.85}
.film-card-wrap{position:relative;border-radius:8px;overflow:hidden;width:130px;aspect-ratio:2/3;background:var(--border);transition:transform 0.2s ease}
.film-card:active .film-card-wrap{transform:scale(0.96)}
.film-card-img{width:100%;height:100%;object-fit:cover;display:block}
.film-card-overlay{position:absolute;bottom:0;left:0;right:0;padding:8px;background:linear-gradient(transparent,rgba(0,0,0,.92))}
.film-card-title{font-size:11px;font-weight:600;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

/* Film Grid 2 col */
.film-grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:0 16px}
.fg2{cursor:pointer}.fg2:active{opacity:.85}
.fg2-wrap{position:relative;border-radius:10px;overflow:hidden;width:100%;aspect-ratio:2/3;background:var(--border);transition:transform 0.2s}
.fg2:active .fg2-wrap{transform:scale(0.96)}
.fg2-img{width:100%;height:100%;object-fit:cover;display:block}
.fg2-overlay{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.92))}
.fg2-title{font-size:13px;font-weight:600;color:#fff;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3}

/* ══════════════════════════════════════
   SEARCH
══════════════════════════════════════ */
.search-bar{padding:14px 16px 0;display:flex;gap:10px}
.s-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:11px 14px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif;outline:none}
.s-input:focus{border-color:var(--gold-dim)}
.s-input::placeholder{color:var(--muted)}
.s-btn{background:var(--gold);border:none;border-radius:var(--radius);
  padding:11px 16px;color:#000;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
.sm-tabs{display:flex;gap:8px;padding:10px 16px 0}
.sm-tab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
.sm-tab.active{background:var(--gold);color:#000;border-color:var(--gold)}

/* ══════════════════════════════════════
   JADWAL
══════════════════════════════════════ */
.sch-wrap{padding:0 16px}
.day-tabs-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:10px}
.day-tabs-scroll::-webkit-scrollbar{display:none}
.day-tab{flex:0 0 auto;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;
  cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--muted);transition:all .2s}
.day-tab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.sch-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

/* ══════════════════════════════════════
   DETAIL PAGE
══════════════════════════════════════ */
#detail-page{display:none;position:fixed;inset:0;z-index:300;background:var(--bg);overflow-y:auto}
#detail-page.open{display:block}
.dp-back{position:sticky;top:0;z-index:10;background:#0c0c0ccc;backdrop-filter:blur(10px);
  padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.back-btn{background:var(--card);border:1px solid var(--border);border-radius:50%;
  width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.back-btn svg{width:16px;height:16px;stroke:var(--text);fill:none;stroke-width:2}
.dp-banner{width:100%;height:240px;position:relative;overflow:hidden}
.dp-banner-img{width:100%;height:100%;object-fit:cover}
.dp-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(12,12,12,.2),var(--bg))}
.dp-content{padding:0 16px 24px}
.dp-row{display:flex;gap:14px;margin-top:-50px;position:relative;z-index:2}
.dp-poster{width:86px;height:122px;object-fit:cover;border-radius:var(--radius);border:2px solid var(--gold-dim);flex-shrink:0;background:var(--border)}
.dp-meta{padding-top:52px;flex:1;min-width:0}
.dp-title{font-size:16px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:7px}
.dp-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.dp-tag{padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;background:var(--gold-bg);color:var(--gold);border:1px solid var(--gold-dim)}
.dp-stats{display:flex;gap:12px;flex-wrap:wrap}
.dp-stat{font-size:11px;color:var(--muted)}
.dp-stat strong{color:var(--gold);font-weight:600}
.dp-synopsis{font-size:13px;line-height:1.7;color:var(--text2);margin:14px 0;padding:12px 14px;background:var(--card);border-radius:var(--radius);border-left:3px solid var(--gold-dim)}
.ep-list-hd{font-size:14px;font-weight:700;color:var(--text);margin:16px 0 10px;display:flex;align-items:center;gap:8px}
.ep-list-hd span{font-size:12px;color:var(--muted);font-weight:400}
.ep-list{display:flex;flex-direction:column;gap:6px}
.ep-row{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;
  background:var(--card);border-radius:var(--radius-sm);border:1px solid var(--border);cursor:pointer}
.ep-row:active{border-color:var(--gold-dim)}
.ep-row-num{font-size:13px;font-weight:700;color:var(--gold);min-width:52px}
.ep-row-title{font-size:12px;color:var(--text);flex:1}
.ep-row-date{font-size:10px;color:var(--muted);margin-left:6px;flex-shrink:0}
.ep-row-arr{color:var(--muted);font-size:18px}

/* ══════════════════════════════════════
   WATCH PAGE
══════════════════════════════════════ */
#watch-page{display:none;position:fixed;inset:0;z-index:400;background:#000;overflow-y:auto}
#watch-page.open{display:block}
.wp-back{position:sticky;top:0;z-index:10;background:#000c;backdrop-filter:blur(8px);
  padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #222}
#player-wrap{width:100%;aspect-ratio:16/9;background:#111}
#player-frame{width:100%;height:100%;border:none;display:block}
.wp-info{padding:12px 16px 0}
.wp-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:3px}
.wp-sub{font-size:12px;color:var(--gold)}
.srv-section{padding:12px 16px}
.srv-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.srv-list{display:flex;flex-wrap:wrap;gap:7px}
.srv-btn{padding:7px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:var(--card);color:var(--text2);font-size:12px;cursor:pointer;transition:all .2s}
.srv-btn.active{border-color:var(--gold);color:var(--gold);background:var(--gold-bg)}
.wp-nav{display:flex;gap:10px;padding:8px 16px 24px}
.ep-nav-btn{flex:1;padding:11px;border-radius:var(--radius-sm);background:var(--card);
  border:1px solid var(--border);color:var(--text2);font-size:12px;cursor:pointer;text-align:center}
.ep-nav-btn:active{border-color:var(--gold-dim)}
.ep-nav-btn:disabled{opacity:.3;cursor:default}

/* ── LOADER / EMPTY / TOAST ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:12px}
.spinner{width:32px;height:32px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--gold);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ldr-txt{font-size:12px;color:var(--muted)}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px}
.empty-ico{font-size:34px;margin-bottom:10px}
#toast{position:fixed;bottom:calc(var(--nav-h)+12px);left:50%;transform:translateX(-50%) translateY(10px);
  background:var(--card2);border:1px solid var(--gold-dim);color:var(--text);padding:8px 16px;
  border-radius:var(--radius-sm);font-size:12px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<nav id="topnav">
  <div>
    <div class="logo">HIDAKASTREAM</div>
    <span class="logo-sub">Streaming · Donghua · Film</span>
  </div>
  <div class="icon-btn" onclick="goSearch()">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
  </div>
</nav>

<div id="app">

<!-- ══ BERANDA ══ -->
<section id="sec-home" class="section active">
  <div class="hero-wrap" id="home-hero-wrap"><div class="hero-track" id="home-hero-track"></div><div class="hero-dots" id="home-hero-dots"></div></div>
  <div id="cw-section" style="display:none">
    <div class="sh"><span class="sh-title">Lanjutkan Nonton</span><button class="sh-more" onclick="clearHistory()">Hapus</button></div>
    <div class="cw-scroll" id="cw-list"></div>
  </div>
  <div class="sh"><span class="sh-title">Episode Terbaru</span></div>
  <div class="ep-scroll" id="home-latest"><div class="loader"><div class="spinner"></div></div></div>
  <div class="gline" style="margin:14px 0 0"></div>
  <div class="sh"><span class="sh-title">Rekomendasi Fantasy</span></div>
  <div class="grid3" id="home-fantasy"><div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div></div>
  <div class="gline" style="margin:14px 0 0"></div>

<script>
const DH_API = "/api/donghub";
const LK_API = "/api/lk21";
const IMG = u => u ? `/api/img?url=${encodeURIComponent(u)}` : "";
const HIST_KEY = "hs_history";

// State
let scheduleLoaded=false, scheduleData={}, currentDay="";
let seriesMode="new", seriesPage=1;
let filmGridMode="home", filmPage=1;
let searchModeVal="donghua";
let watchData=null;
let homeHeroTimer=null, homeHeroIdx=0, homeHeroItems=[];
let dhHeroTimer=null, dhHeroIdx=0, dhHeroItems=[];
let filmFeatured=null;
let dhLoaded=false, filmLoaded=false;

// ── UTILS ──
function slug(url){ return url?url.replace(/^https?:\/\/[^/]+\//,"").replace(/\/$/,""):""; }
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
async function apiGet(base,p){ const r=await fetch(`${base}?${new URLSearchParams(p)}`); if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); }

// ── HISTORY ──
function getHist(){ try{return JSON.parse(localStorage.getItem(HIST_KEY)||"[]")}catch{return[]} }
function saveHist(h){ localStorage.setItem(HIST_KEY,JSON.stringify(h)) }
function addHist(slugVal,epTitle,seriesTitle,thumb,type){
  let h=getHist().filter(x=>x.slug!==slugVal);
  h.unshift({slug:slugVal,epTitle,seriesTitle,thumb,type:type||"donghua",ts:Date.now()});
  saveHist(h.slice(0,12));
}
function clearHistory(){ saveHist([]); renderCW(); }
function renderCW(){
  const h=getHist(); const sec=document.getElementById("cw-section"); const list=document.getElementById("cw-list");
  if(!h.length){sec.style.display="none";return;}
  sec.style.display="block";
  list.innerHTML=h.map(i=>`
    <div class="cw-card" onclick="${i.type==='film'?`openFilmWatch('${encodeURIComponent(i.slug)}','${encodeURIComponent(i.seriesTitle||"")}','${encodeURIComponent(i.thumb||"")}')`:`openWatch('${encodeURIComponent(i.slug)}')`}">
      <img class="cw-thumb" src="${IMG(i.thumb)}" onerror="this.style.background='#2a2a2a'" loading="lazy"/>
      <div class="cw-bar"><div class="cw-prog"></div></div>
      <div class="cw-info"><div class="cw-ep">${i.epTitle||""}</div><div class="cw-title">${i.seriesTitle||""}</div></div>
    </div>`).join("");
}

// ── HERO (generic) ──
function buildHero(trackId, dotsId, items, timerRef, idxRef, clickFn){
  const track=document.getElementById(trackId);
  const dots=document.getElementById(dotsId);
  if(!track || !dots) return null;
  track.innerHTML=""; dots.innerHTML="";
  items.forEach((i,idx)=>{
    const slide=document.createElement("div"); slide.className="hero-slide";
    slide.innerHTML=`<img class="hero-img" src="${IMG(i.thumbnail||i.image)}" onerror="this.style.background='#1a1a1a'" loading="lazy"/>
      <div class="hero-overlay">
        <div class="hero-badge">✦ Populer</div>
        <div class="hero-title">${escapeHtml(i.title)}</div>
        <div class="hero-meta"><span class="hero-status">ONGOING</span><span style="color:var(--muted)">•</span><span>Donghua</span></div>
      </div>`;
    slide.onclick=()=>clickFn(i);
    track.appendChild(slide);
    const dot=document.createElement("div"); dot.className="hero-dot"+(idx===0?" active":"");
    dot.onclick=(e)=>{e.stopPropagation();goHeroTo(trackId,dotsId,idx,timerRef,idxRef,items.length);};
    dots.appendChild(dot);
  });
  return setInterval(()=>{
    if(idxRef.val===undefined) idxRef.val=0;
    idxRef.val=(idxRef.val+1)%items.length;
    goHeroTo(trackId,dotsId,idxRef.val,timerRef,idxRef,items.length);
  },4000);
}
function goHeroTo(trackId,dotsId,i){
  const track=document.getElementById(trackId);
  const dots=document.getElementById(dotsId);
  if(track) track.style.transform=`translateX(-${i*100}%)`;
  if(dots) document.querySelectorAll(`#${dotsId} .hero-dot`).forEach((d,idx)=>d.classList.toggle("active",idx===i));
}
function escapeHtml(str){ if(!str) return ""; return str.replace(/[&<>]/g,function(m){if(m==="&") return "&amp;"; if(m==="<") return "&lt;"; if(m===">") return "&gt;"; return m;}); }

// ── SECTION NAV ──
function showSection(name){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".bnav").forEach(b=>b.classList.remove("active"));
  document.getElementById("sec-"+name).classList.add("active");
  document.getElementById("bn-"+name).classList.add("active");
  if(name==="schedule"&&!scheduleLoaded) loadSchedule();
  if(name==="donghua"&&!dhLoaded){ dhLoaded=true; loadDonghuaSection(); }
  if(name==="film"&&!filmLoaded){ filmLoaded=true; loadFilmSection(); }
  if(name==="home"){ renderCW(); }
}
function goSearch(){ showSection("search"); setTimeout(()=>document.getElementById("s-input").focus(),100); }

// ══ BERANDA ══
async function loadHome(){
  try{
    const [homeData,newData,trendData]=await Promise.all([
      apiGet(DH_API,{cmd:"home"}),
      apiGet(DH_API,{cmd:"new-series",page:1}),
      apiGet(LK_API,{cmd:"trending",page:1})
    ]);
    const pop=homeData.popular_series||[];

    // Hero
    if(pop.length){
      const idxRef={val:0};
      if(homeHeroTimer) clearInterval(homeHeroTimer);
      homeHeroTimer=buildHero("home-hero-track","home-hero-dots",pop.slice(0,8),homeHeroTimer,idxRef,
        i=>openDetail(encodeURIComponent(slug(i.url))));
    }

    renderEpScroll(document.getElementById("home-latest"),homeData.latest_episodes||[]);
    renderPopular(pop);

    const kw=["perfect","immortal","heaven","god","spirit","dragon","sword","martial","dao","cultivat","divine","soul","battle","renegade","tales","coiling"];
    const fan=(homeData.latest_episodes||[]).filter(i=>kw.some(k=>i.title.toLowerCase().includes(k))).slice(0,9);
    renderGrid3(document.getElementById("home-fantasy"),fan.length?fan:(homeData.latest_episodes||[]).slice(0,9));
    renderEpScroll(document.getElementById("home-new"),(newData.result||[]).slice(0,12));

    // Film row
    const films=(trendData.movies||[]).slice(0,12);
    const el=document.getElementById("home-film-row");
    if(el) el.innerHTML=films.map(i=>filmCardHTML(i)).join("");
  }catch(e){ console.warn(e); const el=document.getElementById("home-latest"); if(el) el.innerHTML=`<div class="empty">Gagal memuat</div>`; }
  renderCW();
}

// ══ DONGHUA SECTION ══
async function loadDonghuaSection(){
  try{
    const [homeData,todayData]=await Promise.all([
      apiGet(DH_API,{cmd:"home"}),
      apiGet(DH_API,{cmd:"schedule"})
    ]);
    const pop=homeData.popular_series||[];

    // Hero
    if(pop.length){
      const idxRef={val:0};
      if(dhHeroTimer) clearInterval(dhHeroTimer);
      dhHeroTimer=buildHero("dh-hero-track","dh-hero-dots",pop.slice(0,8),dhHeroTimer,idxRef,
        i=>openDetail(encodeURIComponent(slug(i.url))));
    }

    renderEpScroll(document.getElementById("dh-latest"),homeData.latest_episodes||[]);

    // Today schedule
    const todayMap=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const todayName=todayMap[new Date().getDay()];
    const sched=todayData.result||{};
    const todayItems=sched[todayName]||[];
    renderEpScroll(document.getElementById("dh-today"),todayItems.slice(0,12));
  }catch(e){ console.warn(e); }
  loadDHGrid();
}

async function loadDHGrid(){
  const el=document.getElementById("dh-grid");
  if(!el) return;
  el.innerHTML=`<div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>`;
  try{
    const d=await apiGet(DH_API,{cmd:seriesMode==="new"?"new-series":"completed",page:seriesPage});
    if(!d.result||!d.result.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1">Tidak ada data</div>`;return;}
    el.innerHTML=d.result.map(i=>gcHTML(i,"openDetail")).join("");
    const prevBtn=document.getElementById("dpage-prev");
    const nextBtn=document.getElementById("dpage-next");
    if(prevBtn) prevBtn.disabled=seriesPage<=1;
    if(nextBtn) nextBtn.disabled=!d.has_next;
  }catch{el.innerHTML=`<div class="empty" style="grid-column:1/-1">⚠️ Gagal memuat</div>`;}
}
function switchSeries(mode){
  seriesMode=mode; seriesPage=1;
  const dtabNew=document.getElementById("dtab-new");
  const dtabDone=document.getElementById("dtab-done");
  const dhGridTitle=document.getElementById("dh-grid-title");
  if(dtabNew) dtabNew.classList.toggle("active",mode==="new");
  if(dtabDone) dtabDone.classList.toggle("active",mode==="completed");
  if(dhGridTitle) dhGridTitle.textContent=mode==="new"?"Series Terbaru":"Series Tamat";
  loadDHGrid();
}
function changeDPage(dir){ seriesPage=Math.max(1,seriesPage+dir); loadDHGrid(); const sec=document.getElementById("sec-donghua"); if(sec) sec.scrollTop=0; }

// ══ FILM SECTION (NETFLIX STYLE) ══
async function loadFilmSection(){
  try{
    const [trendData, homeData] = await Promise.all([
      apiGet(LK_API, { cmd: "trending", page: 1 }),
      apiGet(LK_API, { cmd: "home", page: 1 })
    ]);

    // Featured Banner - ambil dari trending atau home
    const featList = (trendData.movies && trendData.movies.length) ? trendData.movies : (homeData.movies || []);
    const feat = featList[0];
    if (feat) {
      filmFeatured = feat;
      let det = { title: feat.title, synopsis: "", year: "", genre: "", image: feat.image };
      try {
        const d = await apiGet(LK_API, { cmd: "detail", url: feat.url });
        if (d.success) det = d.detail;
      } catch (e) { console.warn("Detail fetch failed", e); }
      renderFilmFeatured(det, feat.url);
    } else {
      const featDiv=document.getElementById("film-featured");
      if(featDiv) featDiv.innerHTML = `<div class="empty" style="height:100%">Tidak ada film</div>`;
    }

    // Trending row
    const tr = document.getElementById("film-trending-row");
    if(tr) tr.innerHTML = (trendData.movies || []).slice(0, 15).map(i => filmCardHTML(i)).join("");

    // Home row (terbaru)
    const hr = document.getElementById("film-home-row");
    if(hr) hr.innerHTML = (homeData.movies || []).slice(0, 15).map(i => filmCardHTML(i)).join("");

    // Jika trending row kosong, sembunyikan
    if((!trendData.movies || trendData.movies.length === 0) && tr && tr.closest(".film-row-wrap")) {
      tr.closest(".film-row-wrap").style.display = "none";
    }
  } catch (e) {
    console.error(e);
    const featDiv=document.getElementById("film-featured");
    if(featDiv) featDiv.innerHTML = `<div class="empty" style="height:100%"><div class="empty-ico">⚠️</div>Gagal memuat film</div>`;
  }
}

function renderFilmFeatured(det, url) {
  const safeTitle = (det.title || "Film").substring(0, 45);
  const safeSynopsis = (det.synopsis || "").substring(0, 160);
  const yearBadge = (det.year && det.year !== "-") ? `<span class="film-feat-year">${det.year}</span><div class="film-feat-sep"></div>` : "";
  const genreText = (det.genre || "").split(",")[0] || "Film";
  const featDiv=document.getElementById("film-featured");
  if(!featDiv) return;
  
  featDiv.innerHTML = `
    <img class="film-feat-img" src="${IMG(det.image)}" onerror="this.style.background='#1a1a1a'; this.src=''"/>
    <div class="film-feat-overlay">
      <div class="film-feat-label">✦ NOW STREAMING</div>
      <div class="film-feat-title">${escapeHtml(safeTitle)}</div>
      <div class="film-feat-meta">
        ${yearBadge}
        <span class="film-feat-genre">${escapeHtml(genreText)}</span>
      </div>
      ${safeSynopsis ? `<div class="film-feat-synopsis">${escapeHtml(safeSynopsis)}</div>` : ""}
      <div class="film-feat-btns">
        <button class="film-feat-play" onclick="openFilmWatch('${encodeURIComponent(url)}','${encodeURIComponent(safeTitle)}','${encodeURIComponent(det.image || "")}')">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3" fill="#000"/></svg>
          Tonton
        </button>
        <button class="film-feat-info" onclick="openFilmDetail('${encodeURIComponent(url)}')">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          Detail
        </button>
      </div>
    </div>`;
}

function filmCardHTML(i) {
  return `<div class="film-card" onclick="openFilmDetail('${encodeURIComponent(i.url)}')">
    <div class="film-card-wrap">
      <img class="film-card-img" src="${IMG(i.image)}" onerror="this.style.background='#2a2a2a'" loading="lazy"/>
      <div class="film-card-overlay"><div class="film-card-title">${escapeHtml((i.title || "").substring(0, 35))}</div></div>
    </div>
  </div>`;
}

function filmShowGrid(mode){
  filmGridMode=mode; filmPage=1;
  const gridSection=document.getElementById("film-grid-section");
  const ftabHome=document.getElementById("ftab-home");
  const ftabTrending=document.getElementById("ftab-trending");
  const gridTitle=document.getElementById("film-grid-title");
  if(gridSection) gridSection.style.display="block";
  if(ftabHome) ftabHome.classList.toggle("active",mode==="home");
  if(ftabTrending) ftabTrending.classList.toggle("active",mode==="trending");
  if(gridTitle) gridTitle.textContent=mode==="trending"?"Film Trending":"Film Terbaru";
  loadFilmGrid();
  setTimeout(()=>{ if(gridSection) gridSection.scrollIntoView({behavior:"smooth"}); },100);
}
function closeFilmGrid(){ const gs=document.getElementById("film-grid-section"); if(gs) gs.style.display="none"; }
function switchFilmGrid(mode){ filmGridMode=mode; filmPage=1;
  const ftabHome=document.getElementById("ftab-home");
  const ftabTrending=document.getElementById("ftab-trending");
  const gridTitle=document.getElementById("film-grid-title");
  if(ftabHome) ftabHome.classList.toggle("active",mode==="home");
  if(ftabTrending) ftabTrending.classList.toggle("active",mode==="trending");
  if(gridTitle) gridTitle.textContent=mode==="trending"?"Film Trending":"Film Terbaru";
  loadFilmGrid();
}
async function loadFilmGrid(){
  const el=document.getElementById("film-grid");
  if(!el) return;
  el.innerHTML=`<div class="loader" style="grid-column:1/-1"><div class="spinner"></div></div>`;
  try{
    const d=await apiGet(LK_API,{cmd:filmGridMode,page:filmPage});
    const movies=d.movies||d.results||[];
    if(!movies.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1">Tidak ada data</div>`;return;}
    el.innerHTML=movies.map(i=>`
      <div class="fg2" onclick="openFilmDetail('${encodeURIComponent(i.url)}')">
        <div class="fg2-wrap">
          <img class="fg2-img" src="${IMG(i.image)}" onerror="this.style.background='#2a2a2a'" loading="lazy"/>
          <div class="fg2-overlay"><div class="fg2-title">${escapeHtml(i.title)}</div></div>
        </div>
      </div>`).join("");
    const prevBtn=document.getElementById("fpage-prev");
    const nextBtn=document.getElementById("fpage-next");
    if(prevBtn) prevBtn.disabled=filmPage<=1;
    if(nextBtn) nextBtn.disabled=movies.length<8;
  }catch{el.innerHTML=`<div class="empty" style="grid-column:1/-1">⚠️ Gagal memuat</div>`;}
}
function changeFPage(dir){ filmPage=Math.max(1,filmPage+dir); loadFilmGrid(); }

// ── RENDER HELPERS ──

function renderGrid3(el,items){

function gcHTML(i,fn){

function renderPopular(items){

// ── SEARCH ──
const searchInput=document.getElementById("s-input");
if(searchInput) searchInput.addEventListener("keydown",e=>{if(e.key==="Enter")doSearch();});
function setSearchMode(m){
  searchModeVal=m;
  const smodeDh=document.getElementById("smode-dh");
  const smodeFilm=document.getElementById("smode-film");
  if(smodeDh) smodeDh.classList.toggle("active",m==="donghua");
  if(smodeFilm) smodeFilm.classList.toggle("active",m==="film");
}
async function doSearch(){
  const q=document.getElementById("s-input").value.trim(); if(!q) return;
  const el=document.getElementById("search-results");
  if(!el) return;
  el.innerHTML=`<div class="loader"><div class="spinner"></div><div class="ldr-txt">Mencari "${escapeHtml(q)}"...</div></div>`;
  try{
    if(searchModeVal==="donghua"){
      const d=await apiGet(DH_API,{cmd:"search",query:q});
      if(!d.result||!d.result.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div>Tidak ada hasil</div>`;return;}
      el.innerHTML=`<div class="grid3" style="padding-top:8px">${d.result.map(i=>gcHTML(i,"openDetail")).join("")}</div>`;
    } else {
      const d=await apiGet(LK_API,{cmd:"search",query:q});
      if(!d.results||!d.results.length){el.innerHTML=`<div class="empty"><div class="empty-ico">🔍</div>Tidak ada hasil</div>`;return;}
      el.innerHTML=`<div class="film-grid2" style="padding-top:8px">${d.results.map(i=>`
        <div class="fg2" onclick="openFilmDetail('${encodeURIComponent(i.url)}')">
          <div class="fg2-wrap">
            <img class="fg2-img" src="${IMG(i.image)}" onerror="this.style.background='#2a2a2a'" loading="lazy"/>
            <div class="fg2-overlay"><div class="fg2-title">${escapeHtml(i.title)}</div></div>
          </div>
        </div>`).join("")}</div>`;
    }
  }catch{el.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div>Gagal mencari</div>`;}
}

// ── SCHEDULE ──
async function loadSchedule(){
  scheduleLoaded=true;
  try{
    const d=await apiGet(DH_API,{cmd:"schedule"});
    scheduleData=d.result||{};
    const days=Object.keys(scheduleData);
    const dayTabs=document.getElementById("day-tabs");
    const schGrid=document.getElementById("sch-grid");
    if(!days.length){if(schGrid) schGrid.innerHTML=`<div class="empty" style="grid-column:1/-1">Tidak ada jadwal</div>`;return;}
    const todayMap=["Minggu","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"];
    const todayName=todayMap[new Date().getDay()];
    currentDay=days.includes(todayName)?todayName:days[0];
    if(dayTabs) dayTabs.innerHTML=days.map(day=>`
      <button class="day-tab ${day===currentDay?'active':''}" onclick="switchDay('${day}')">${day}</button>`).join("");
    renderSchDay(currentDay);
  }catch(e){ console.warn(e); const sg=document.getElementById("sch-grid"); if(sg) sg.innerHTML=`<div class="empty" style="grid-column:1/-1">⚠️ Gagal</div>`; }
}
function switchDay(day){
  currentDay=day;
  document.querySelectorAll(".day-tab").forEach(b=>b.classList.toggle("active",b.textContent===day));
  renderSchDay(day);
}
function renderSchDay(day){
  const items=scheduleData[day]||[];
  const el=document.getElementById("sch-grid");
  if(!el) return;
  if(!items.length){el.innerHTML=`<div class="empty" style="grid-column:1/-1">Tidak ada</div>`;return;}
  el.innerHTML=items.map(i=>gcHTML(i,"openDetail")).join("");
}

// ── DONGHUA DETAIL ──
async function openDetail(encodedSlug){
  const s=decodeURIComponent(encodedSlug);
  const page=document.getElementById("detail-page");
  const body=document.getElementById("dp-body");
  const backTitle=document.getElementById("dp-back-title");
  if(backTitle) backTitle.textContent=s;
  if(body) body.innerHTML=`<div class="loader" style="padding:60px"><div class="spinner"></div><div class="ldr-txt">Memuat...</div></div>`;
  if(page) page.classList.add("open");
  document.body.style.overflow="hidden";
  try{
    const d=await apiGet(DH_API,{cmd:"detail",slug:s});
    if(d.error){if(body) body.innerHTML=`<div class="empty"><div class="empty-ico">😞</div>${d.error}</div>`;return;}
    if(backTitle) backTitle.textContent=d.title;
    const eps=d.result||[];
    if(body) body.innerHTML=`
      <div class="dp-banner"><img class="dp-banner-img" src="${IMG(d.poster)}" onerror="this.style.display='none'"/></div>
      <div class="dp-content">
        <div class="dp-row">
          <img class="dp-poster" src="${IMG(d.poster)}" onerror="this.style.background='#2a2a2a'"/>
          <div class="dp-meta">
            <div class="dp-title">${escapeHtml(d.title)}</div>
            <div class="dp-tags">${(d.genres||[]).slice(0,4).map(g=>`<span class="dp-tag">${escapeHtml(g)}</span>`).join("")}</div>
            <div class="dp-stats">
              ${d.rating?`<div class="dp-stat">⭐ <strong>${escapeHtml(d.rating)}</strong></div>`:""}
              ${d.status?`<div class="dp-stat">📺 <strong>${escapeHtml(d.status)}</strong></div>`:""}
              ${d.total_episodes?`<div class="dp-stat">🎬 <strong>${escapeHtml(d.total_episodes)} Ep</strong></div>`:""}
            </div>
          </div>
        </div>
        ${d.synopsis?`<div class="dp-synopsis">${escapeHtml(d.synopsis)}</div>`:""}
        <div class="ep-list-hd">Daftar Episode <span>(${eps.length})</span></div>
        <div class="ep-list">
          ${eps.map(e=>`
            <div class="ep-row" onclick="openWatch('${encodeURIComponent(slug(e.url))}','${encodeURIComponent(d.title)}','${encodeURIComponent(d.poster||"")}')">
              <span class="ep-row-num">Ep ${escapeHtml(e.episode)}</span>
              <span class="ep-row-title">${escapeHtml(e.title||d.title)}</span>
              <span class="ep-row-date">${escapeHtml(e.release_date||"")}</span>
              <span class="ep-row-arr">›</span>
            </div>`).join("")}
        </div>
      </div>`;
  }catch(e){ if(body) body.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div>Gagal memuat</div>`; }
}
function closeDetail(){ const page=document.getElementById("detail-page"); if(page) page.classList.remove("open"); document.body.style.overflow=""; }

// ── FILM DETAIL ──
async function openFilmDetail(encodedUrl){
  const url=decodeURIComponent(encodedUrl);
  const page=document.getElementById("detail-page");
  const body=document.getElementById("dp-body");
  const backTitle=document.getElementById("dp-back-title");
  if(backTitle) backTitle.textContent="Memuat...";
  if(body) body.innerHTML=`<div class="loader" style="padding:60px"><div class="spinner"></div><div class="ldr-txt">Memuat film...</div></div>`;
  if(page) page.classList.add("open");
  document.body.style.overflow="hidden";
  try{
    const d=await apiGet(LK_API,{cmd:"detail",url});
    if(!d.success){if(body) body.innerHTML=`<div class="empty"><div class="empty-ico">😞</div>Film tidak ditemukan</div>`;return;}
    const det=d.detail;
    if(backTitle) backTitle.textContent=det.title;
    if(body) body.innerHTML=`
      <div class="dp-banner"><img class="dp-banner-img" src="${IMG(det.image)}" onerror="this.style.display='none'"/></div>
      <div class="dp-content">
        <div class="dp-row">
          <img class="dp-poster" src="${IMG(det.image)}" onerror="this.style.background='#2a2a2a'"/>
          <div class="dp-meta">
            <div class="dp-title">${escapeHtml(det.title)}</div>
            <div class="dp-tags">${(det.genre||"").split(",").filter(Boolean).map(g=>`<span class="dp-tag">${escapeHtml(g.trim())}</span>`).join("")}</div>
            <div class="dp-stats">
              ${det.year&&det.year!=="-"?`<div class="dp-stat">📅 <strong>${escapeHtml(det.year)}</strong></div>`:""}
              <div class="dp-stat">🎬 <strong>Film</strong></div>
            </div>
          </div>
        </div>
        ${det.synopsis?`<div class="dp-synopsis">${escapeHtml(det.synopsis)}</div>`:""}
        <div class="ep-list-hd">Tonton Film</div>
        <div class="ep-list">
          <div class="ep-row" onclick="openFilmWatch('${encodeURIComponent(url)}','${encodeURIComponent(det.title)}','${encodeURIComponent(det.image||"")}')">
            <span class="ep-row-num" style="font-size:18px">▶</span>
            <span class="ep-row-title">Tonton Sekarang</span>
            <span class="ep-row-arr">›</span>
          </div>
        </div>
      </div>`;
  }catch(e){ if(body) body.innerHTML=`<div class="empty"><div class="empty-ico">⚠️</div>Gagal memuat</div>`; }
}

// ── DONGHUA WATCH ──
async function openWatch(encodedSlug, encodedSeries, encodedThumb){
  const s=decodeURIComponent(encodedSlug);
  const seriesTitle=encodedSeries?decodeURIComponent(encodedSeries):"";
  const thumb=encodedThumb?decodeURIComponent(encodedThumb):"";
  const page=document.getElementById("watch-page");
  const backTitle=document.getElementById("wp-back-title");
  const epTitle=document.getElementById("wp-ep-title");
  const seriesTitleEl=document.getElementById("wp-series-title");
  const player=document.getElementById("player-frame");
  const srvList=document.getElementById("srv-list");
  if(backTitle) backTitle.textContent=s;
  if(epTitle) epTitle.textContent="";
  if(seriesTitleEl) seriesTitleEl.textContent=seriesTitle;
  if(player) player.src="";
  if(srvList) srvList.innerHTML=`<div class="loader" style="width:100%"><div class="spinner"></div></div>`;
  if(page) page.classList.add("open");
  try{
    const d=await apiGet(DH_API,{cmd:"watch",slug:s});
    watchData=d;
    if(backTitle) backTitle.textContent=d.title;
    if(epTitle) epTitle.textContent=d.title;
    const url=d.video_url||(d.servers&&d.servers[0]&&d.servers[0].url);
    if(url && player) player.src=url;
    const allSrv=[];
    if(d.video_url) allSrv.push({name:"Default",url:d.video_url});
    (d.servers||[]).forEach(sv=>{if(sv.url&&sv.url!==d.video_url) allSrv.push(sv);});
    if(srvList) srvList.innerHTML=allSrv.length
      ?allSrv.map((sv,i)=>`<button class="srv-btn ${i===0?'active':''}" onclick="switchSrv(this,'${encodeURIComponent(sv.url)}')">${escapeHtml(sv.name||"Mirror "+(i+1))}</button>`).join("")
      :`<div style="color:var(--muted);font-size:12px">Tidak ada mirror</div>`;
    const prevBtn=document.getElementById("btn-prev-ep");
    const nextBtn=document.getElementById("btn-next-ep");
    if(prevBtn) prevBtn.disabled=!d.prev_episode;
    if(nextBtn) nextBtn.disabled=!d.next_episode;
    if(seriesTitle) addHist(s,d.title,seriesTitle,thumb,"donghua");
  }catch(e){
    if(srvList) srvList.innerHTML=`<div style="color:var(--muted);font-size:12px;padding:8px">⚠️ Gagal memuat player</div>`;
  }
}

// ── FILM WATCH ──
async function openFilmWatch(encodedUrl, encodedTitle, encodedThumb){
  const url=decodeURIComponent(encodedUrl);
  const title=encodedTitle?decodeURIComponent(encodedTitle):"";
  const thumb=encodedThumb?decodeURIComponent(encodedThumb):"";
  const page=document.getElementById("watch-page");
  const backTitle=document.getElementById("wp-back-title");
  const epTitle=document.getElementById("wp-ep-title");
  const seriesTitleEl=document.getElementById("wp-series-title");
  const player=document.getElementById("player-frame");
  const srvList=document.getElementById("srv-list");
  const prevBtn=document.getElementById("btn-prev-ep");
  const nextBtn=document.getElementById("btn-next-ep");
  if(backTitle) backTitle.textContent=title;
  if(epTitle) epTitle.textContent=title;
  if(seriesTitleEl) seriesTitleEl.textContent="Film";
  if(player) player.src="";
  if(srvList) srvList.innerHTML=`<div class="loader" style="width:100%"><div class="spinner"></div></div>`;
  if(prevBtn) prevBtn.disabled=true;
  if(nextBtn) nextBtn.disabled=true;
  if(page) page.classList.add("open");
  try{
    const d=await apiGet(LK_API,{cmd:"stream",url});
    if(d.embed_url && player){
      player.src=d.embed_url;
      if(srvList) srvList.innerHTML=`<button class="srv-btn active">Server 1</button>`;
      addHist(url,title,title,thumb,"film");
    } else {
      if(srvList) srvList.innerHTML=`<div style="color:var(--muted);font-size:12px">Tidak ada stream</div>`;
    }
  }catch(e){
    if(srvList) srvList.innerHTML=`<div style="color:var(--muted);font-size:12px;padding:8px">⚠️ Gagal memuat stream</div>`;
  }
}

function switchSrv(btn,encodedUrl){
  document.querySelectorAll(".srv-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const player=document.getElementById("player-frame");
  if(player) player.src=decodeURIComponent(encodedUrl);
}
function navEp(dir){
  if(!watchData) return;
  const url=dir==="next"?watchData.next_episode:watchData.prev_episode;
  if(url) openWatch(encodeURIComponent(slug(url)));
}
function closeWatch(){
  const page=document.getElementById("watch-page");
  const player=document.getElementById("player-frame");
  if(page) page.classList.remove("open");
  if(player) player.src="";
  watchData=null; renderCW();
}

// Start
loadHome();
